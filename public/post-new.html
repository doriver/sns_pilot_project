<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>글 작성</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav"></div>
  <h1>글쓰기</h1>
  <form id="f" enctype="multipart/form-data">
    <input name="title" type="text" placeholder="제목" maxlength="120" required />
    <textarea name="content" rows="6" placeholder="내용" required></textarea>
    <input name="images" type="file" accept="image/*" multiple />
    <button type="submit">등록</button>
  </form>
  <p id="msg"></p>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    if (!API.getToken()) location.href = '/login.html';
    document.getElementById('f').onsubmit = async (e) => {
      e.preventDefault();
      try {
        const post = await API.upload('/api/posts', new FormData(e.target));
        location.href = `/post-detail.html?id=${post._id}`;
      } catch (err) {
        document.getElementById('msg').innerText = err.message;
      }
    };
  </script>
</body>
</html>
