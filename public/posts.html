<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>글 목록</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav"></div>
  <h1>글 목록</h1>
  <p><a href="/post-new.html">글쓰기</a></p>
  <div id="list"></div>
  <div id="pager"></div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const page = Number(new URLSearchParams(location.search).get('page')) || 1;
    (async () => {
      try {
        const data = await API.get(`/api/posts?page=${page}&limit=10`);
        document.getElementById('list').innerHTML = data.items.map((p) => `
          <div class="card">
            <div class="meta">${p.author?.nickname} · ${new Date(p.createdAt).toLocaleString()} · 조회 ${p.viewCount} · 좋아요 ${p.likeUsers?.length || 0}</div>
            <a href="/post-detail.html?id=${p._id}">${escapeHtml(p.content.slice(0, 80))}</a>
          </div>
        `).join('') || '<p>글이 없습니다.</p>';
        const pager = [];
        for (let i = 1; i <= data.totalPages; i++) {
          pager.push(i === page ? `<b>${i}</b>` : `<a href="?page=${i}">${i}</a>`);
        }
        document.getElementById('pager').innerHTML = pager.join(' ');
      } catch (e) {
        document.getElementById('list').innerText = e.message;
      }
    })();
    function escapeHtml(s) { return s.replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
  </script>
</body>
</html>
