<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>글 목록</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="nav"></div>
  <div class="list-header">
    <h1>글 목록</h1>
    <a class="btn-write" href="/post-new.html">글쓰기</a>
  </div>
  <div id="list" class="post-list"></div>
  <div id="pager" class="pager"></div>

  <script src="/js/api.js"></script>
  <script src="/js/avatar.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const page = Number(new URLSearchParams(location.search).get('page')) || 1;
    (async () => {
      try {
        const data = await API.get(`/api/posts?page=${page}&limit=20`);
        const list = document.getElementById('list');
        if (!data.items.length) { list.innerHTML = '<p class="empty">글이 없습니다.</p>'; }
        else {
          list.innerHTML = data.items.map((p) => `
            <div class="post-row">
              <div class="title">
                <a href="/post-detail.html?id=${p._id}">${escapeHtml(p.title || '(제목 없음)')}</a>
              </div>
              <div class="meta">
                <span>${Avatar.withName(p.author, 'sm')}</span>
                <span>${formatDate(p.createdAt)}</span>
                <span>조회 ${p.viewCount}</span>
                <span>♥ ${p.likeUsers?.length || 0}</span>
              </div>
            </div>
          `).join('');
        }
        const pager = [];
        for (let i = 1; i <= data.totalPages; i++) {
          pager.push(i === page ? `<b>${i}</b>` : `<a href="?page=${i}">${i}</a>`);
        }
        document.getElementById('pager').innerHTML = pager.join(' ');
      } catch (e) {
        document.getElementById('list').innerText = e.message;
      }
    })();
    function escapeHtml(s) { return (s || '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
    function formatDate(d) {
      const dt = new Date(d);
      const today = new Date();
      if (dt.toDateString() === today.toDateString()) {
        return dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }
      return dt.toLocaleDateString();
    }
  </script>
</body>
</html>
